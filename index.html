<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Road Trip Bingo Generator</title>
<style>
  :root {
    --accent: #2d6cdf;
    --accent-dark: #1f4fa8;
    --bg: #f4f6fb;
    --card: #ffffff;
    --border: #d7deea;
    --text: #1b2330;
    --muted: #5b6678;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  header {
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: #fff;
    padding: 2rem 1rem;
    text-align: center;
  }
  header h1 { margin: 0 0 .25rem; font-size: 1.9rem; }
  header p { margin: 0; opacity: .9; }
  main {
    max-width: 720px;
    margin: -1.5rem auto 3rem;
    padding: 0 1rem;
  }
  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem;
    box-shadow: 0 8px 24px rgba(20,40,80,.07);
  }
  .field { margin-bottom: 1.25rem; }
  .field:last-child { margin-bottom: 0; }
  label { display: block; font-weight: 600; margin-bottom: .35rem; }
  label .hint { display: block; font-weight: 400; font-size: .85rem; color: var(--muted); margin-top: .1rem; }
  input[type="text"], input[type="number"], textarea, select {
    width: 100%;
    padding: .6rem .7rem;
    font-size: 1rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: inherit;
    background: #fff;
    color: var(--text);
  }
  select { cursor: pointer; }
  input:focus, textarea:focus, select:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
  textarea { min-height: 90px; resize: vertical; }
  .row { display: flex; gap: 1rem; flex-wrap: wrap; }
  .row .field { flex: 1; min-width: 180px; }
  .range-wrap { display: flex; align-items: center; gap: .75rem; }
  .range-wrap input[type="range"] { flex: 1; }
  .range-val { font-weight: 700; color: var(--accent); min-width: 3.2rem; text-align: right; }
  .checkbox-field { display: flex; align-items: center; gap: .5rem; }
  .checkbox-field input { width: auto; }
  .checkbox-field label { margin: 0; }
  button {
    width: 100%;
    margin-top: .5rem;
    padding: .85rem 1rem;
    font-size: 1.05rem;
    font-weight: 700;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background .15s ease;
  }
  button:hover { background: var(--accent-dark); }
  button:disabled { background: #9bb1d8; cursor: default; }
  #status { margin-top: .9rem; text-align: center; font-size: .95rem; color: var(--muted); min-height: 1.2em; }
  #status.error { color: #c0392b; }
  details { margin-top: 1.25rem; }
  summary { cursor: pointer; font-weight: 600; color: var(--accent); }
  .wordlist-preview { font-size: .85rem; color: var(--muted); margin-top: .5rem; }
  .wordlist-help { font-size: .85rem; color: var(--muted); margin: .6rem 0 .2rem; }
  .wordlist-chips { display: flex; flex-wrap: wrap; gap: .35rem; margin-top: .5rem; }
  .chip {
    font-size: .8rem; padding: .22rem .55rem; border-radius: 999px;
    border: 1px solid var(--border); background: #fff; color: var(--text);
    cursor: pointer; user-select: none; transition: background .12s ease, border-color .12s ease, color .12s ease;
  }
  .chip:hover { border-color: var(--accent); }
  .chip.always { background: #e3f7ec; border-color: #2e9e57; color: #1e7e3c; font-weight: 600; }
  .chip.always::before { content: "\2605\00a0"; }
  .chip.blocked { background: #fdecea; border-color: #e0796d; color: #c0392b; text-decoration: line-through; }
  .chip.blocked::before { content: "\2715\00a0"; }
  .chip-tag { display: inline-block; padding: 0 .4rem; border-radius: 999px; font-size: .78rem; border: 1px solid var(--border); }
  .chip-tag.always { background: #e3f7ec; color: #1e7e3c; border-color: #2e9e57; }
  .chip-tag.blocked { background: #fdecea; color: #c0392b; border-color: #e0796d; }
  footer { text-align: center; color: var(--muted); font-size: .85rem; padding: 0 1rem 2rem; }
  footer a { color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1>🚗 Road Trip Bingo Generator</h1>
  <p>Create printable bingo cards for your next adventure</p>
</header>

<main>
  <div class="panel">
    <div class="field">
      <label for="title">Card title
        <span class="hint">Printed at the top of every card.</span>
      </label>
      <input type="text" id="title" value="Road Trip Bingo" maxlength="60">
    </div>

    <div class="row">
      <div class="field">
        <label for="numCards">Number of cards
          <span class="hint">How many unique cards to generate.</span>
        </label>
        <input type="number" id="numCards" value="8" min="1" max="200">
      </div>
      <div class="field">
        <label for="gridSize">Grid size
          <span class="hint">Cells per side.</span>
        </label>
        <input type="number" id="gridSize" value="5" min="3" max="6">
      </div>
    </div>

    <div class="field">
      <label for="gameType">Game type
        <span class="hint">The winning pattern — its name, rule, and a diagram are printed on every card.</span>
      </label>
      <select id="gameType">
        <option value="line">Line — any row, column, or diagonal</option>
        <option value="corners">Four corners</option>
        <option value="letterT">Letter T</option>
        <option value="letterX">Letter X</option>
        <option value="plus">Plus sign (+)</option>
        <option value="frame">Picture frame (outer edge)</option>
        <option value="blackout">Blackout (whole card)</option>
      </select>
    </div>

    <div class="field">
      <label for="commonPct">Items shared across all cards
        <span class="hint">This % of each card uses the same items (in shuffled positions) on every card.</span>
      </label>
      <div class="range-wrap">
        <input type="range" id="commonPct" min="0" max="100" step="5" value="20">
        <span class="range-val" id="commonPctVal">20%</span>
      </div>
    </div>

    <div class="field checkbox-field">
      <input type="checkbox" id="freeSpace" checked>
      <label for="freeSpace">Include a free center space (odd grids only)</label>
    </div>

    <div class="field" id="freeLabelField">
      <label for="freeLabel">Center space label
        <span class="hint">Shown in the pre-marked center square. Leave as <strong>FREE</strong>, or set a custom word that everyone starts with.</span>
      </label>
      <input type="text" id="freeLabel" value="FREE" maxlength="24">
    </div>

    <div class="field">
      <label for="customItems">Custom items
        <span class="hint">One per line (or comma-separated). Mixed into the built-in word list.</span>
      </label>
      <textarea id="customItems" placeholder="Grandma's house&#10;Blue pickup truck&#10;State welcome sign"></textarea>
    </div>

    <button id="generate">Generate PDF</button>
    <div id="status"></div>

    <details>
      <summary>Built-in word list (<span id="defaultCount">0</span> items)</summary>
      <p class="wordlist-help">
        Click a word to cycle it: normal &rarr;
        <span class="chip-tag always">on every card</span> &rarr;
        <span class="chip-tag blocked">blocked</span> &rarr; normal.
      </p>
      <div class="wordlist-chips" id="defaultChips"></div>
    </details>
  </div>
</main>

<footer>
  Runs entirely in your browser — nothing is uploaded. Use your browser's print/save dialog to print the PDF.
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="app.js"></script>
</body>
</html>
